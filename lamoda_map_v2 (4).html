<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0d;color:#fff;min-height:100%}
.layout{display:flex;flex-direction:column}
.map-container{height:calc(100vh - 56px);position:relative;flex-shrink:0}
.cities-section{padding:40px 24px;background:#0d0d0d;border-top:1px solid #1a1a1a}
.cities-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.cities-title{font-size:18px;font-weight:600;color:#fff}
.cities-sub{font-size:12px;color:#555}
.cities-legend{display:flex;gap:16px;font-size:11px;color:#555;flex-wrap:wrap}
.cities-legend span{display:flex;align-items:center;gap:5px}
.cities-legend i{display:inline-block;width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cities-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.city-card{background:#111;border:0.5px solid #222;border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .15s}
.city-card:hover{border-color:#333}
.city-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.city-card.p1::before{background:#FFB800}
.city-card.p2::before{background:#EF9F27}
.city-card.p3::before{background:#FAC775}
.city-card.p4::before{background:#FAC775;opacity:.5}
.city-name{font-size:14px;font-weight:500;color:#fff;margin-bottom:8px}
.city-num{font-size:22px;font-weight:600;letter-spacing:-.5px;line-height:1}
.city-label{font-size:11px;color:#555;margin-top:3px}
.city-badge{position:absolute;top:12px;right:12px;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
.badge-p1{background:#2a1f00;color:#FFB800}
.badge-p2{background:#1a1500;color:#EF9F27}
.badge-p3{background:#111;color:#666;border:0.5px solid #2a2a2a}
.badge-p4{background:#111;color:#444;border:0.5px solid #222}
.cities-total{margin-top:16px;background:#111;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border:0.5px solid #222}
.cities-total-label{font-size:13px;color:#555}
.cities-total-nums{display:flex;gap:24px}
.total-item{text-align:right}
.total-item .n{font-size:18px;font-weight:600;color:#fff;display:block}
.total-item .l{font-size:11px;color:#555;display:block}
@media(max-width:640px){.cities-section{padding:24px 16px}.cities-grid{grid-template-columns:repeat(2,1fr)}}

/* HEADER */
header{background:#0d0d0d;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;z-index:200}
.logo{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.3px;white-space:nowrap}
.logo span{color:#FF3B00}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:7px 12px 7px 32px;color:#fff;font-size:13px;outline:none}
.search-wrap input::placeholder{color:#555}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#555;font-size:13px}
#suggest{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;z-index:9999;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.suggest-item{padding:9px 12px;font-size:13px;color:#ccc;cursor:pointer;border-bottom:1px solid #222}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover{background:#252525}
.header-right{display:flex;align-items:center;gap:8px}
.loading-badge{font-size:11px;color:#666;white-space:nowrap}

/* MAP */
#map{width:100%;height:100%}

/* LAYER PANEL */
#layerPanel{position:absolute;top:16px;right:16px;background:rgba(13,13,13,.92);backdrop-filter:blur(8px);border:1px solid #2a2a2a;border-radius:12px;padding:12px 14px;z-index:500;min-width:210px}
.panel-title{font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.layer-row{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer}
.layer-check{width:14px;height:14px;flex-shrink:0;cursor:pointer}
.layer-icon{flex-shrink:0}
.layer-label{font-size:13px;color:#ccc;flex:1}
.panel-divider{border:none;border-top:1px solid #222;margin:8px 0}
.panel-actions{display:flex;justify-content:space-between}
.panel-btn{font-size:11px;color:#555;background:none;border:none;cursor:pointer;padding:0}
.panel-btn:hover{color:#ccc}

/* MOBILE */
#layerToggle{display:none;position:absolute;top:16px;right:16px;background:rgba(13,13,13,.92);border:1px solid #2a2a2a;border-radius:8px;padding:8px 10px;z-index:600;color:#ccc;font-size:13px;cursor:pointer}
@media(max-width:640px){
  header{padding:0 12px}
  .header-right{display:none}
  #layerPanel{display:none;top:56px;right:0;left:0;border-radius:0;border-left:none;border-right:none}
  #layerPanel.open{display:block}
  #layerToggle{display:block}
}

<body>
<div class="layout">
  <header>
    <div class="logo">LAMODA<span>·</span>ПВЗ</div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Город или адрес...">
      <div id="suggest"></div>
    </div>
    <div class="header-right">
      <span class="loading-badge" id="loadingBadge">Загрузка данных...</span>
    </div>
  </header>

  <div class="map-container">
    <div id="map"></div>

    <!-- Layer Panel -->
    <button id="layerToggle" onclick="togglePanel()">⊞ Слои</button>
    <div id="layerPanel">
      <div class="panel-title">Слои карты</div>

      <label class="layer-row">
        <input type="checkbox" class="layer-check" id="l-pvz" checked onchange="toggleLayer('pvz')">
        <span class="layer-icon"><svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#0d0d0d" stroke="white" stroke-width="2"/></svg></span>
        <span class="layer-label">Действующие ПВЗ</span>
      </label>

      <label class="layer-row">
        <input type="checkbox" class="layer-check" id="l-pipeline" checked onchange="toggleLayer('pipeline')">
        <span class="layer-icon"><svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#185FA5" stroke="#85B7EB" stroke-width="2"/></svg></span>
        <span class="layer-label">В воронке</span>
      </label>

      <label class="layer-row">
        <input type="checkbox" class="layer-check" id="l-zones" checked onchange="toggleLayer('zones')">
        <span class="layer-icon"><svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="rgba(59,109,17,.2)" stroke="#3B6D11" stroke-width="1.5"/></svg></span>
        <span class="layer-label">Целевые зоны</span>
      </label>

      <label class="layer-row">
        <input type="checkbox" class="layer-check" id="l-rejected" checked onchange="toggleLayer('rejected')">
        <span class="layer-icon"><svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#555" stroke="#888" stroke-width="1.5"/><line x1="5" y1="5" x2="9" y2="9" stroke="white" stroke-width="1.5"/></svg></span>
        <span class="layer-label">Архив отказов</span>
      </label>

      <hr class="panel-divider">
      <div class="panel-actions">
        <button class="panel-btn" onclick="setAll(true)">Включить все</button>
        <button class="panel-btn" onclick="setAll(false)">Выключить все</button>
      </div>
    </div>
  </div>
</div>

// Fetch Google Sheet
async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const r = await fetch(url);
  const text = await r.text();
  const json = JSON.parse(text.slice(text.indexOf('{'), text.lastIndexOf('}')+1));
  return (json.table.rows||[]).map(row =>
    (row.c||[]).map(c => c ? (c.v !== undefined ? c.v : '') : '')
  ).filter(r => r.some(v => v !== '' && v !== null));
}

// Fetch city polygon from Nominatim
async function fetchCityPolygon(cityName) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName+', Россия')}&format=json&limit=1&polygon_geojson=1`;
  const r = await fetch(url, {headers:{'User-Agent':'LamodaPVZ/1.0'}});
  const data = await r.json();
  if (data.length && data[0].geojson) return data[0].geojson;
  return null;
}

// GeoJSON coords → Yandex coords array
function geoJsonToYandex(geojson) {
  if (geojson.type === 'Polygon') {
    return geojson.coordinates.map(ring => ring.map(([lon,lat]) => [lat,lon]));
  }
  if (geojson.type === 'MultiPolygon') {
    return geojson.coordinates.map(poly => poly.map(ring => ring.map(([lon,lat]) => [lat,lon])));
  }
  return null;
}

            hintContent: String(city),
            balloonContentHeader: `<b>${city}</b>`,
            balloonContentBody: `<div style="font-size:12px;color:#888;margin-bottom:4px">Приоритет ${p}</div><div style="font-size:18px;font-weight:600">${target}</div><div style="font-size:11px;color:#888">целевых ПВЗ</div>`
          }, {
            fillColor: cfg.fill,
            strokeColor: cfg.stroke,
            strokeWidth: cfg.width,
            strokeStyle: cfg.dash ? cfg.dash : 'solid',
            fillOpacity: 1,
            zIndex: 1
          });
        } else {
          // MultiPolygon
          poly = new ymaps.GeoObjectCollection();
          coords.forEach(polygonCoords => {
            poly.add(new ymaps.Polygon(polygonCoords, {
              hintContent: String(city),
              balloonContentHeader: `<b>${city}</b>`,
              balloonContentBody: `<div style="font-size:12px;color:#888;margin-bottom:4px">Приоритет ${p}</div><div style="font-size:18px;font-weight:600">${target}</div><div style="font-size:11px;color:#888">целевых ПВЗ</div>`
            }, {
              fillColor: cfg.fill,
              strokeColor: cfg.stroke,
              strokeWidth: cfg.width,
              strokeStyle: cfg.dash ? cfg.dash : 'solid',
              fillOpacity: 1,
              zIndex: 1
            }));
          });
        }
        layers.cities.add(poly);
        loaded++;
        badge.textContent = `Города: ${loaded}/${cityRows.length}`;
        await new Promise(r => setTimeout(r, 300));
      } catch(e) {}
    }
  } catch(e) { console.error('cities error:', e); }

  // ── LAYER 1: PVZ (static, bulk load) ──
  badge.textContent = 'Загрузка ПВЗ...';
  const blackDot = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14">' +
    '<circle cx="7" cy="7" r="5" fill="#0d0d0d" stroke="white" stroke-width="2"/></svg>'
  );
  const clusterer = new ymaps.Clusterer({
    groupByCoordinates:false,
    clusterIconLayout: ymaps.templateLayoutFactory.createClass(
      '<div style="width:{{options.iconContentSize[0]}}px;height:{{options.iconContentSize[1]}}px;' +
      'background:#0d0d0d;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;' +
      'font-size:11px;font-weight:600;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)">' +
      '{{properties.geoObjects.length}}</div>'
    ),
    clusterIconContentLayout:null, iconContentSize:[32,32], iconOffset:[-16,-16]
  });

  const pvzMarkers = PVZ_STATIC.map(p => {
    const pm = new ymaps.Placemark([p[0],p[1]], {
      hintContent: p[2],
      balloonContentHeader: `<b>${p[2]}</b>`,
      balloonContentBody: '<div style="font-size:11px;color:#888">ПВЗ Lamoda · охранная зона 500м</div>'
    }, {
      iconLayout:'default#image', iconImageHref:blackDot,
      iconImageSize:[14,14], iconImageOffset:[-7,-7], zIndex:10
    });
    return pm;
  });

  // Protection zones (only at zoom >= 12)
  const zonesCollection = new ymaps.GeoObjectCollection();
  let zonesDrawn = false;
  map.events.add('boundschange', function() {
    const z = map.getZoom();
    if (z >= 12 && !zonesDrawn && document.getElementById('l-pvz').checked) {
      const b = map.getBounds();
      PVZ_STATIC.forEach(p => {
        if (p[0]>=b[0][0]-.05 && p[0]<=b[1][0]+.05 && p[1]>=b[0][1]-.05 && p[1]<=b[1][1]+.05) {
          zonesCollection.add(new ymaps.Circle([[p[0],p[1]],500],{},{
            fillColor:'#FF3B0012', strokeColor:'#FF3B00',
            strokeOpacity:.45, strokeWidth:1, strokeStyle:'dash', zIndex:5
          }));
        }
      });
      layers.pvz.add(zonesCollection);
      zonesDrawn = true;
    } else if (z < 12 && zonesDrawn) {
      layers.pvz.remove(zonesCollection);
      zonesCollection.removeAll();
      zonesDrawn = false;
    }
  });

  clusterer.add(pvzMarkers);
  layers.pvz.add(clusterer);

  // ── LAYER 2: Pipeline ──
  badge.textContent = 'Загрузка воронки...';
  try {
    const pipelineRows = await fetchSheet('pipeline');
    const blueDot = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14">' +
      '<circle cx="7" cy="7" r="5" fill="#185FA5" stroke="#85B7EB" stroke-width="2"/></svg>'
    );
    pipelineRows.forEach(row => {
      const [lat, lon, address] = row;
      if (!lat || !lon) return;
      layers.pipeline.add(new ymaps.Placemark([parseFloat(lat), parseFloat(lon)], {
        hintContent: String(address),
        balloonContentHeader: `<b>${address}</b>`,
        balloonContentBody: '<span style="background:#E6F1FB;color:#0C447C;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500">В работе</span>&nbsp;<span style="font-size:12px;color:#888">Локация занята</span>'
      }, {
        iconLayout:'default#image', iconImageHref:blueDot,
        iconImageSize:[14,14], iconImageOffset:[-7,-7], zIndex:15
      }));
    });
  } catch(e) { console.error('pipeline error:', e); }

  // ── LAYER 3: Zones ──
  badge.textContent = 'Загрузка зон...';
  try {
    const zoneRows = await fetchSheet('zones');
    zoneRows.forEach(row => {
      const [lat, lon, anchor] = row;
      if (!lat || !lon) return;
      layers.zones.add(new ymaps.Circle(
        [[parseFloat(lat), parseFloat(lon)], 200],
        {
          hintContent: String(anchor),
          balloonContentHeader: `<b>${anchor}</b>`,
          balloonContentBody: '<div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px">Целевая зона</div>'
        },
        {
          fillColor:'#3B6D1118', strokeColor:'#3B6D11',
          strokeWidth:1.5, zIndex:8
        }
      ));
    });
  } catch(e) { console.error('zones error:', e); }

  // ── LAYER 5: Rejected ──
  badge.textContent = 'Загрузка архива...';
  try {
    const rejectedRows = await fetchSheet('rejected');
    const grayDot = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14">' +
      '<circle cx="7" cy="7" r="5" fill="#555" stroke="#888" stroke-width="1.5"/>' +
      '<line x1="5" y1="5" x2="9" y2="9" stroke="white" stroke-width="1.5"/>' +
      '<line x1="9" y1="5" x2="5" y2="9" stroke="white" stroke-width="1.5"/></svg>'
    );
    rejectedRows.forEach(row => {
      const [lat, lon, address, reason] = row;
      if (!lat || !lon) return;
      layers.rejected.add(new ymaps.Placemark([parseFloat(lat), parseFloat(lon)], {
        hintContent: String(address),
        balloonContentHeader: `<b>${address}</b>`,
        balloonContentBody: `<div style="font-size:12px;color:#888;margin-bottom:4px">Причина отказа</div><div style="font-size:13px">${reason||'—'}</div>`
      }, {
        iconLayout:'default#image', iconImageHref:grayDot,
        iconImageSize:[14,14], iconImageOffset:[-7,-7], zIndex:12
      }));
    });
  } catch(e) { console.error('rejected error:', e); }

  badge.textContent = `${PVZ_STATIC.length} ПВЗ загружено`;



  // ── SEARCH ──
  const searchInput = document.getElementById('searchInput');
  const suggestEl = document.getElementById('suggest');

  searchInput.addEventListener('input', function() {
    const q = this.value.trim();
    if (q.length < 2) { suggestEl.style.display='none'; return; }
    clearTimeout(searchTimer);
    searchTimer = setTimeout(async () => {
      try {
        const res = await ymaps.geocode(q, {results:5, boundedBy:[[41,19],[82,180]]});
        const items = res.geoObjects.toArray();
        suggestEl.innerHTML = '';
        if (!items.length) { suggestEl.style.display='none'; return; }
        items.forEach(item => {
          const name = item.getAddressLine();
          const coords = item.geometry.getCoordinates();
          const el = document.createElement('div');
          el.className = 'suggest-item';
          el.textContent = name;
          el.onclick = () => {
            map.setCenter(coords, 14, {duration:500});
            searchInput.value = name;
            suggestEl.style.display = 'none';
            if (window._pin) map.geoObjects.remove(window._pin);
            window._pin = new ymaps.Placemark(coords, {hintContent:name}, {preset:'islands#redDotIcon'});
            map.geoObjects.add(window._pin);
          };
          suggestEl.appendChild(el);
        });
        suggestEl.style.display = 'block';
      } catch(e) {}
    }, 300);
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) suggestEl.style.display='none';
  });
  searchInput.addEventListener('keydown', e => {
    if (e.key==='Escape') suggestEl.style.display='none';
    if (e.key==='Enter') { const f=suggestEl.querySelector('.suggest-item'); if(f) f.click(); }
  });
});

// Layer toggle
function toggleLayer(name) {
  const col = layers[name];
  if (!col) return;
  const visible = document.getElementById('l-'+name).checked;
  visible ? map.geoObjects.add(col) : map.geoObjects.remove(col);
}
function setAll(val) {
  ['pvz','pipeline','zones','rejected'].forEach(k => {
    document.getElementById('l-'+k).checked = val;
    toggleLayer(k);
  });
}
function togglePanel() {
  document.getElementById('layerPanel').classList.toggle('open');
}

// ── CITIES BLOCK — runs independently of map ──
async function renderCitiesBlock() {
  try {
    const cityRows = await fetchSheet('cities');
    const BADGE = {1:'П1',2:'П2',3:'П3',4:'П4'};
    const BADGE_CLASS = {1:'badge-p1',2:'badge-p2',3:'badge-p3',4:'badge-p4'};
    const grid = document.getElementById('citiesGrid');
    grid.innerHTML = '';
    let totalPvz = 0;
    cityRows.forEach(row => {
      const [city, priority, target] = row;
      if (!city) return;
      const p = parseInt(priority) || 1;
      const t = parseInt(target) || 0;
      totalPvz += t;
      const card = document.createElement('div');
      card.className = 'city-card p' + p;
      card.innerHTML =
        '<div class="city-badge ' + BADGE_CLASS[p] + '">' + BADGE[p] + '</div>' +
        '<div class="city-name">' + city + '</div>' +
        '<div class="city-num">' + t + '</div>' +
        '<div class="city-label">целевых ПВЗ</div>';
      grid.appendChild(card);
    });
    document.getElementById('totalCities').textContent = cityRows.filter(r=>r[0]).length;
    document.getElementById('totalPvz').textContent = totalPvz;
    document.getElementById('citiesTotal').style.display = 'flex';
  } catch(e) {
    document.getElementById('citiesGrid').innerHTML =
      '<div style="color:#555;font-size:13px;padding:20px 0">Не удалось загрузить данные</div>';
  }
}
renderCitiesBlock();
</script>

<section class="cities-section" id="cities-block">
  <div class="cities-header">
    <div>
      <div class="cities-title">Фокусные города</div>
      <div class="cities-sub">Приоритеты и план открытий</div>
    </div>
    <div class="cities-legend">
      <span><i style="background:#FFB800"></i>Приоритет 1</span>
      <span><i style="background:#EF9F27"></i>Приоритет 2</span>
      <span><i style="background:#FAC775"></i>Приоритет 3</span>
      <span><i style="background:#FAC775;opacity:.4"></i>Ситилит</span>
    </div>
  </div>
  <div class="cities-grid" id="citiesGrid">
    <div style="color:#555;font-size:13px;padding:20px 0">Загрузка городов...</div>
  </div>
  <div class="cities-total" id="citiesTotal" style="display:none">
    <div class="cities-total-label">Итого по программе</div>
    <div class="cities-total-nums">
      <div class="total-item"><span class="n" id="totalCities">0</span><span class="l">городов</span></div>
      <div class="total-item"><span class="n" id="totalPvz">0</span><span class="l">целевых ПВЗ</span></div>
    </div>
  </div>
</section>
</body>
